<!DOCTYPE html>
<html>

<head>
    <title>API Demo</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f9;
        }

        img {
            max-width: 400px;
            max-height: 400px;
            display: none;
            margin: 20px auto;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 4px;
            transition: background 0.3s;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>

<body>

    <h1>Random Food</h1>
    <button id="loadBtn">Search</button>
    <br>
    <img id="dogImg" src="" alt="Dog image">

    <script src="app.js"></script>
</body>

</html>
